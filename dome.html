<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sri Sawdammal Infra</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="receipt-container">

  <!-- Header -->
  <div class="title-box">
    <h1>Sri Sawdammal Infra (Input)</h1>
  </div>

  <!-- Top Details -->
  <table class="info-table">
    <tr>
      <td class="label">From :</td>
      <td><input type="text" id="fromField"></td>
      <td rowspan="4" class="empty-box"></td>
      <td class="label">Place :</td>
      <td><input type="text" value="Kendaigoundanur"></td>
    </tr>
    <tr>
      <td></td>
      <td></td>
      <td></td>
      <td><input type="text" value="Sullerumbu"></td>
    </tr>
    <tr>
      <td class="label">To :</td>
      <td><input type="text" id="toField"></td>
      <td></td>
      <td><input type="text" value="Dindigul"></td>
    </tr>
    <tr>
      <td></td>
      <td id="material-label">MATERIAL INPUT</td>
      <td class="label">Cell No :</td>
      <td>
        <input type="text" value="790469983"><br>
        <input type="text" value="6369477188">
      </td>
    </tr>
  </table>

  <!-- Main Table -->
  <table id="receiptTable">
    <thead>
      <tr>
        <th>NO</th>
        <th>Date</th>
        <th>Material</th>
        <th>Qty</th>
        <th>Price</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <!-- Rows generated by JS -->
    </tbody>
    <tfoot>
      <tr>
        <td colspan="4" class="grand-text">Total</td>
        <td colspan="2" id="grandTotal">0.00</td>
      </tr>
    </tfoot>
  </table>

  <!-- Buttons (hidden on print) -->
  <div class="buttons" id="btns">
    <button id="addRowBtn">➕ Add Row</button>
    <button id="shareBtn">📤 Share</button>
    <button id="saveBtn">💾 Save</button>
    <button onclick="window.print()">🖨️ Print</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
